<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>No Connection — Discover Bank</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Arial',sans-serif;background:linear-gradient(135deg,#001F3F,#00325F);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center}
.card{background:white;border-radius:16px;padding:2.5rem;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.icon{font-size:4rem;margin-bottom:1rem}
h1{font-size:1.4rem;font-weight:700;color:#00325F;margin-bottom:0.75rem}
p{font-size:0.88rem;color:#6C757D;line-height:1.6;margin-bottom:1.5rem}
.btn{display:block;padding:0.9rem;background:#E87722;color:white;border:none;border-radius:8px;font-size:0.95rem;font-weight:700;cursor:pointer;text-decoration:none;font-family:Arial}
.contact{margin-top:1.5rem;font-size:0.82rem;color:#6C757D}
.contact a{color:#00325F;font-weight:600;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📶</div>
  <h1>No Internet Connection</h1>
  <p>It looks like you're offline. Please check your internet connection and try again. Your account data is safe.</p>
  <button class="btn" onclick="location.reload()">🔄 Try Again</button>
  <div class="contact">
    Need urgent help?<br/>
    <a href="tel:+442099469200">📞 +44 20 9946 9200</a>
  </div>
</div>
</body>
</html>
